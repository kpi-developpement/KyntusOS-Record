version: '3.8'

services:
  # 1. Le Backend (Spring Boot - M-réglé 3la 8083)
  backend:
    build:
      context: ./operatingsystem
      dockerfile: Dockerfile
    container_name: kyntus_record_backend
    restart: always
    ports:
      - "8083:8083" # 🔥 App 2 Backend f 8083
    environment:
      # 🔥 CONNECTION M3A L'DATABASE DYAL APP 1:
      # 172.17.0.1 kat-wssel nishan l'bab 5432 lli m7loul f l'Serveur (10.10.10.50)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://172.17.0.1:5432/kyntus_db?reWriteBatchedInserts=true
      - SPRING_DATASOURCE_USERNAME=kyntus_user
      - SPRING_DATASOURCE_PASSWORD=kyntus_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    networks:
      - kyntus-record-network

  # 2. Le Frontend (Next.js - M-réglé 3la 3030)
  frontend:
    build:
      context: ./kyntus-os-frontend
      dockerfile: Dockerfile
    container_name: kyntus_record_frontend
    restart: always
    ports:
      - "3030:3000" # 🔥 App 2 Frontend f 3030
    environment:
      # 🔥 THE NEXUS LINK: L'IP s7i7 dyal l'VPS bach Chrome y3ref Tri9 l'Backend
      - NEXT_PUBLIC_API_URL=http://10.10.10.50:8083
    depends_on:
      - backend
    networks:
      - kyntus-record-network

networks:
  kyntus-record-network:
    driver: bridge