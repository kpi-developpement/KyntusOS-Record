version: '3.8'

services:
  backend:
    build:
      context: ./operatingsystem
      dockerfile: Dockerfile
    container_name: operatingsystem
    ports:
      - "8084:8082" 
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://10.10.10.50:5432/kyntus_db
    restart: unless-stopped
    networks:
      - kyntus-network

  frontend:
    build:
      context: ./kyntus-os-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://10.10.10.50:8084   # 🔥 THE FIX HOUWA HADA
    container_name: kyntus-os-frontend
    ports:
      - "3005:3000"
    restart: unless-stopped
    networks:
      - kyntus-network

networks:
  kyntus-network:
    driver: bridge